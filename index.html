<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetReady — CCNA Study Game</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/anki.css" />
  <link rel="stylesheet" href="css/firebase-auth.css" />
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg class="logo-icon" viewBox="0 0 200 50" width="160" height="40">
        <polyline points="0,25 20,25 30,10 40,42 50,25 200,25" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
        <circle cx="50" cy="25" r="3" fill="#00f0ff" opacity="0.8"/>
        <text x="4" y="35" font-family="monospace" font-weight="900" font-size="28" fill="#00f0ff" letter-spacing="1">NET</text>
        <text x="76" y="35" font-family="monospace" font-weight="900" font-size="28" fill="#e8f4ff" letter-spacing="1">READY</text>
      </svg>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Play</div>

      <a href="#" class="nav-item active" data-tool="anki">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        <span>Territory Map</span>
      </a>

      <div class="nav-section-label" style="margin-top:24px;">Social</div>

      <a href="#" class="nav-item disabled" data-tool="leaderboard" title="Coming soon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 21V11M16 21V7M12 21V3"/>
        </svg>
        <span>Leaderboard</span>
        <span class="badge-soon">Soon</span>
      </a>

      <a href="#" class="nav-item disabled" data-tool="friends" title="Coming soon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <span>Friends</span>
        <span class="badge-soon">Soon</span>
      </a>

      <a href="#" class="nav-item disabled" data-tool="challenges" title="Coming soon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span>Challenges</span>
        <span class="badge-soon">Soon</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <span>NetReady v2.0</span>
    </div>
  </aside>

  <!-- ── Main Content ───────────────────────────────────── -->
  <main class="main-content">

    <!-- Top bar -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>
      <h1 class="topbar-title">NetReady</h1>
      <div class="topbar-meta">
        <span class="stat-chip" id="statTotal"></span>
      </div>

      <!-- Auth UI -->
      <div class="topbar-auth" id="topbarAuth">
        <div class="sync-indicator" id="syncIndicator">
          <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 8a7 7 0 0113.5-2.5M15 8a7 7 0 01-13.5 2.5"/>
          </svg>
          <span id="syncText">Synced</span>
        </div>
        <button class="auth-sign-in-btn" id="authSignInBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Sign In
        </button>
        <div class="auth-user-info" id="authUserInfo">
          <img class="auth-avatar" id="authAvatar" alt="avatar" style="display:none"/>
          <div class="auth-avatar-placeholder" id="authAvatarPlaceholder" style="display:none"></div>
          <span class="auth-user-name" id="authUserName"></span>
          <button class="auth-sign-out-btn" id="authSignOutBtn">Sign Out</button>
        </div>
      </div>
    </header>

    <!-- ANKI Game -->
    <section class="tool-panel" id="tool-anki">
      <!-- Populated by anki.js -->
    </section>

  </main>

  <!-- ── Login Modal ──────────────────────────────────────── -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-modal">
      <button class="login-modal-close" id="loginClose">&times;</button>
      <h2>Sign In to NetReady</h2>
      <p class="login-subtitle">Sync your progress across devices and compete with friends</p>

      <button class="login-google-btn" id="loginGoogleBtn">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <div class="login-divider">or</div>

      <form class="login-form" id="loginEmailForm">
        <input type="email" class="login-input" id="loginEmail" placeholder="Email address" required />
        <input type="password" class="login-input" id="loginPassword" placeholder="Password" required />
        <button type="submit" class="login-submit-btn" id="loginSubmitBtn">Sign In</button>
      </form>

      <div class="login-toggle">
        <span id="loginToggleText">Don't have an account?</span>
        <a id="loginToggleLink">Create one</a>
      </div>

      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- App scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/anki-data.js"></script>
  <script src="js/anki.js"></script>
  <script>if (window.AnkiEngine) AnkiEngine.init();</script>
  <script src="js/firebase-sync.js"></script>
  <script src="js/firebase-auth.js"></script>
</body>
</html>
